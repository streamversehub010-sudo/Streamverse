<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>StreamVerse — Admin Login</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%232563eb'/%3E%3Cpolygon points='9,7 9,17 17,12' fill='white'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">
    <span class="logo-mark">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <polygon points="8,6 8,18 18,12" fill="#2563eb"/>
      </svg>
    </span>
    <span class="logo-text">Stream<span>Verse</span></span>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
  </ul>
  <div class="nav-right">
    <a class="admin-nav-link" href="login.html" style="font-size:13px;">Viewer Login →</a>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card admin-card">
    <div class="auth-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <h1>Admin Console</h1>
    <p class="auth-sub">Restricted access — StreamVerse staff only.</p>

    <div class="auth-error" id="authError"></div>

    <form id="adminLoginForm">
      <div class="form-field">
        <label>Admin Email</label>
        <input type="email" id="adminIdentifier" autocomplete="username" required>
      </div>
      <div class="form-field">
        <label>Password</label>
        <input type="password" id="adminPassword" autocomplete="current-password" required>
      </div>
      <button type="submit" class="auth-submit">Enter Admin Panel</button>
    </form>

    <div class="auth-hint">
      Secured by Firebase Authentication. Admin access is granted per-account
      in Firestore (<code>role: "admin"</code>) — this page never talks to
      the viewer login/signup flow.
    </div>
  </div>
</div>

<script src="movies-data.js"></script>
<script type="module" src="firebase-auth.js"></script>
<script src="store.js"></script>
<script>
  const authError = document.getElementById('authError');

  function wireAdminLogin(){
    svAuth.currentUser().then((user) => {
      if (user && user.role === 'admin') window.location.href = 'admin.html';
    });

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      authError.classList.remove('show');
      const submitBtn = document.querySelector('#adminLoginForm .auth-submit');
      submitBtn.disabled = true; submitBtn.textContent = 'Checking…';
      const identifier = document.getElementById('adminIdentifier').value;
      const password    = document.getElementById('adminPassword').value;
      const result = await svAuth.login(identifier, password, 'admin');
      submitBtn.disabled = false; submitBtn.textContent = 'Enter Admin Panel';
      if (!result.ok){
        authError.textContent = result.error;
        authError.classList.add('show');
        return;
      }
      window.location.href = 'admin.html';
    });
  }

  if (window.svAuth) wireAdminLogin();
  else window.addEventListener('svAuthReady', wireAdminLogin, { once: true });
</script>
</body>
</html>
